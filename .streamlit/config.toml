[server]
headless = true
address = "0.0.0.0"
port = 8501
enableStaticServing = true

[browser]
gatherUsageStats = false

[theme]
# Streamlit default primary is red; set Phenom-blue branding instead.
primaryColor = "#1E3A5F"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F6F8FB"
textColor = "#0F172A"
font = "sans serif"
base = "light"