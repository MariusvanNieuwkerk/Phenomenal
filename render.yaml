# Render Blueprint — Briefly (Phenom 300 study app)
# Deploy: connect this repo in the Render Dashboard → New → Blueprint.

services:
  - type: web
    name: briefly
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      streamlit run app.py
      --server.port=$PORT
      --server.address=0.0.0.0
      --server.headless=true
      --server.fileWatcherType=none
    healthCheckPath: /_stcore/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
